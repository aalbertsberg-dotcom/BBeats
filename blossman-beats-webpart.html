<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blossman IT – Internet Time</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕐</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:      #050D22;
    --card:    #081530;
    --border:  #163570;
    --accent:  #1B6EC2;
    --accent2: #5BBFFF;
    --glow:    rgba(27,110,194,0.38);
    --text:    #90BFEF;
    --text2:   #E4F0FF;
    --muted:   #4E7EAD;
    --mono:    'Share Tech Mono', monospace;
    --display: 'Rajdhani', sans-serif;
  }
  html, body { height:100%; background:var(--bg); color:var(--text2); overflow:hidden; }
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:10px; }

  /* outer layout */
  .outer { display:flex; gap:6px; width:100%; max-width:380px; align-items:stretch; }

  /* sidebar */
  .sidebar {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:4px;
    width:58px;
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:14px 0;
  }
  .sidebar-logo { width:46px; height:58px; }
  .sidebar-divider { width:20px; height:1px; background:var(--border); }
  .sidebar-text {
    font-family:var(--mono);
    font-size:9px;
    color:var(--accent2);
    letter-spacing:2px;
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    text-transform:uppercase;
    font-weight:bold;
  }
  .sidebar-sub {
    font-family:var(--mono);
    font-size:8px;
    color:var(--muted);
    letter-spacing:2px;
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    text-transform:uppercase;
  }

  /* right column */
  .col { display:flex; flex-direction:column; gap:6px; flex:1; min-width:0; }

  /* banner */
  .banner {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:4px;
    padding:8px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  /* animation overlay */
  .outer { position:relative; }
  #fxCanvas {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
    border-radius:4px;
    z-index:10;
  }
  .countdown-item { text-align:center; flex:1; cursor:pointer; }
  .countdown-item:hover .countdown-emoji { transform:scale(1.2); transition:transform 0.2s; }
  .countdown-emoji { font-size:14px; line-height:1; margin-bottom:2px; }
  .countdown-beats { font-family:var(--mono); font-size:14px; color:var(--accent2); letter-spacing:1px; line-height:1; margin-bottom:2px; }
  .countdown-label { font-family:var(--display); font-size:10px; font-weight:700; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; }
  .countdown-divider { width:1px; height:32px; background:var(--border); flex-shrink:0; margin:0 8px; }

  /* widget shell */
  .shell {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:4px;
    padding:14px 16px 12px;
  }
  .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .brand { font-family:var(--mono); font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; }

  /* beat-synced flash */
  @keyframes beat-flash {
    0%   { opacity:0.6; filter:drop-shadow(0 0 2px rgba(27,110,194,0.3)); transform:scale(1); }
    35%  { opacity:1;   filter:drop-shadow(0 0 14px rgba(91,191,255,1)) drop-shadow(0 0 6px rgba(120,210,255,0.8)); transform:scale(1.5); }
    100% { opacity:0.6; filter:drop-shadow(0 0 2px rgba(27,110,194,0.3)); transform:scale(1); }
  }
  @keyframes logo-flash {
    0%   { filter:drop-shadow(0 0 3px rgba(27,110,194,0.3)) brightness(1); }
    30%  { filter:drop-shadow(0 0 14px rgba(91,191,255,1)) brightness(1.35); }
    100% { filter:drop-shadow(0 0 3px rgba(27,110,194,0.3)) brightness(1); }
  }
  .live-logo { display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; filter:drop-shadow(0 0 2px rgba(27,110,194,0.3)); }
  .live-logo.beat-flash { animation:beat-flash 0.9s ease-out forwards; }
  .sidebar-logo-glow { filter:drop-shadow(0 0 3px rgba(27,110,194,0.3)) brightness(1); }
  .sidebar-logo-glow.beat-flash { animation:logo-flash 0.6s ease-out forwards; }

  /* conv-stat idle hint */
  @keyframes hint-shimmer {
    0%,100% { border-color:rgba(27,110,194,0.15); }
    50%     { border-color:rgba(91,191,255,0.45); }
  }
  .conv-stat.idle-hint { animation:hint-shimmer 1.6s ease-in-out infinite; }
  .conv-hint-text {
    font-family:var(--mono); font-size:8px; color:var(--muted);
    letter-spacing:1.5px; opacity:0; margin-top:3px;
    transition:opacity 0.6s ease;
    text-transform:uppercase;
  }
  .conv-stat.idle-hint .conv-hint-text { opacity:1; }

  .dial-wrap { position:relative; width:200px; height:200px; margin:0 auto 10px; user-select:none; cursor:default; }
  .dial-svg { width:100%; height:100%; transform:rotate(-90deg); overflow:visible; }
  .dial-svg:hover { cursor:grab; }
  body.is-dragging, body.is-dragging * { cursor:grabbing !important; }
  .track { fill:none; stroke:var(--border); stroke-width:5; }
  .progress { fill:none; stroke:url(#arcGrad); stroke-width:5; stroke-linecap:round; transition:stroke-dashoffset 0.9s cubic-bezier(0.4,0,0.2,1); }

  .center-readout { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; pointer-events:none; }
  .beat-label { font-family:var(--mono); font-size:8px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; }
  .beat-value { font-family:var(--mono); font-size:38px; font-weight:400; color:var(--text2); letter-spacing:-1px; line-height:1; text-shadow:0 0 16px var(--glow); transition:color 0.3s; }
  .beat-value.tick { color:var(--accent2); }
  .beat-frac { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:1px; }

  .stats { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:8px; }
  .stat { background:rgba(27,110,194,0.05); border:1px solid var(--border); border-radius:3px; padding:5px 6px; text-align:center; }
  .stat.conv-stat { border-color:rgba(27,110,194,0.2); }
  .stat.conv-stat.active { border-color:rgba(91,191,255,0.5); background:rgba(27,110,194,0.12); }
  .stat-val { font-family:var(--mono); font-size:16px; color:var(--text); line-height:1; margin-bottom:3px; }
  .stat.conv-stat .stat-val { color:var(--muted); }
  .stat.conv-stat.active .stat-val { color:var(--accent2); }
  .stat-lbl { font-family:var(--display); font-size:11px; font-weight:700; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; }

  .footer { display:flex; justify-content:space-between; align-items:center; }
  .footer-note { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:1.5px; }
  .footer-date { font-family:var(--mono); font-size:11px; color:var(--accent2); letter-spacing:2px; font-weight:bold; }
</style>
</head>
<body>
<div class="outer">
  <canvas id="fxCanvas"></canvas>

  <!-- Sidebar -->
  <div class="sidebar">
    <!-- BITS logo — approved clean version, no blade -->
    <svg class="sidebar-logo sidebar-logo-glow" viewBox="-90 -140 180 272" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer flame body -->
      <path d="M 0,-130 C 16,-108 52,-72 57,-34 C 63,9 59,47 48,72 C 37,96 19,112 0,120 C -19,112 -37,96 -48,72 C -59,47 -63,9 -57,-34 C -52,-72 -16,-108 0,-130 Z" fill="#1A2E6E"/>
      <!-- Inner teardrop cyan outline -->
      <path d="M 0,-96 C -26,-66 -41,-32 -41,10 C -41,51 -22,87 0,102 C 22,87 41,51 41,10 C 41,-32 26,-66 0,-96 Z" fill="none" stroke="#38C4E0" stroke-width="3.5"/>
      <!-- Circuit arm LEFT -->
      <line x1="-41" y1="4" x2="-82" y2="4" stroke="#38C4E0" stroke-width="2.8"/>
      <circle cx="-82" cy="4" r="7" fill="none" stroke="#38C4E0" stroke-width="2.8"/>
      <!-- Circuit arm RIGHT -->
      <line x1="41" y1="4" x2="82" y2="4" stroke="#38C4E0" stroke-width="2.8"/>
      <circle cx="82" cy="4" r="7" fill="none" stroke="#38C4E0" stroke-width="2.8"/>
      <!-- Circuit node upper-right diagonal -->
      <line x1="14" y1="-72" x2="36" y2="-92" stroke="#1B6EC2" stroke-width="2.5"/>
      <circle cx="36" cy="-92" r="6" fill="none" stroke="#1B6EC2" stroke-width="2.5"/>
      <!-- Honeycomb dots UPPER -->
      <circle cx="-12" cy="-44" r="5.5" fill="#38C4E0"/>
      <circle cx="0"   cy="-44" r="5.5" fill="#38C4E0"/>
      <circle cx="12"  cy="-44" r="5.5" fill="#38C4E0"/>
      <circle cx="-6"  cy="-33" r="5.5" fill="#38C4E0"/>
      <circle cx="6"   cy="-33" r="5.5" fill="#38C4E0"/>
      <!-- BITS text -->
      <text x="0" y="18" text-anchor="middle" dominant-baseline="central"
            font-family="'Rajdhani',Arial,sans-serif" font-weight="700" font-size="48"
            fill="#E4F0FF" letter-spacing="2">BITS</text>
      <!-- Honeycomb dots LOWER -->
      <circle cx="-12" cy="56" r="5.5" fill="#38C4E0"/>
      <circle cx="0"   cy="56" r="5.5" fill="#38C4E0"/>
      <circle cx="12"  cy="56" r="5.5" fill="#38C4E0"/>
      <circle cx="-6"  cy="67" r="5.5" fill="#38C4E0"/>
      <circle cx="6"   cy="67" r="5.5" fill="#38C4E0"/>
    </svg>
    <div class="sidebar-divider"></div>
    <span class="sidebar-text">Blossman</span>
    <div class="sidebar-divider"></div>
    <span class="sidebar-sub">GAS</span>
    <div class="sidebar-divider"></div>
    <!-- Flame icon at bottom -->
    <svg width="16" height="20" viewBox="0 0 40 50" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 2 C12 12 6 22 6 33 C6 42 12 48 20 48 C28 48 34 42 34 33 C34 22 28 12 20 2Z" fill="#1B6EC2" opacity="0.8"/>
      <path d="M20 18 C16 24 14 30 14 36 C14 41 17 45 20 45 C23 45 26 41 26 36 C26 30 24 24 20 18Z" fill="#5BBFFF" opacity="0.9"/>
    </svg>
  </div>

  <!-- Right column: banner + widget -->
  <div class="col">

    <!-- Countdown banner -->
    <div class="banner">
      <div class="countdown-item">
        <div class="countdown-emoji">🎃</div>
        <div class="countdown-beats" id="halloweenBeats">---,---</div>
        <div class="countdown-label">Halloween</div>
      </div>
      <div class="countdown-divider"></div>
      <div class="countdown-item">
        <div class="countdown-emoji">🎄</div>
        <div class="countdown-beats" id="christmasBeats">---,---</div>
        <div class="countdown-label">Christmas</div>
      </div>
    </div>

    <!-- Widget -->
    <div class="shell">
      <div class="topbar">
        <span class="brand">Internet Time</span>
        <span class="live-logo">
          <!-- Flame icon in topbar -->
          <svg width="12" height="14" viewBox="0 0 40 50" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 2 C12 12 6 22 6 33 C6 42 12 48 20 48 C28 48 34 42 34 33 C34 22 28 12 20 2Z" fill="#1B6EC2"/>
            <path d="M20 18 C16 24 14 30 14 36 C14 41 17 45 20 45 C23 45 26 41 26 36 C26 30 24 24 20 18Z" fill="#5BBFFF"/>
          </svg>
        </span>
      </div>

      <div class="dial-wrap" id="dialWrap">
        <svg class="dial-svg" id="dialSvg" viewBox="0 0 190 190" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop id="arcStop1" offset="0%"   style="stop-color:#0F3D82"/>
              <stop id="arcStop2" offset="100%" style="stop-color:#5BBFFF"/>
            </linearGradient>
          </defs>
          <g id="ticks"></g>
          <circle class="track" cx="95" cy="95" r="88"/>
          <circle class="progress" id="arc" cx="95" cy="95" r="88" stroke-dasharray="552.92" stroke-dashoffset="552.92"/>
          <circle cx="95" cy="95" r="95" fill="transparent"/>
          <circle id="handle" cx="95" cy="7" r="7"
            fill="#5BBFFF" stroke="#050D22" stroke-width="2"
            style="filter:drop-shadow(0 0 5px rgba(91,191,255,0.9))"/>
        </svg>
        <div class="center-readout">
          <span class="beat-label" id="centerLabel">@ beats</span>
          <span class="beat-value" id="beatNum">000</span>
          <span class="beat-frac" id="beatFrac">.00</span>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-val" id="statRemain">1000</div>
          <div class="stat-lbl">Remain</div>
        </div>
        <div class="stat">
          <div class="stat-val">86.4s</div>
          <div class="stat-lbl">/ Beat</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="statLocal">--:--</div>
          <div class="stat-lbl">Local</div>
        </div>
        <div class="stat conv-stat" id="convStat">
          <div class="stat-val" id="convVal">--:--</div>
          <div class="stat-lbl" id="convLbl">@ ?</div>
          <div class="conv-hint-text">drag dial</div>
        </div>
      </div>

      <div class="footer">
        <span class="footer-date" id="footerDate">--</span>
        <span class="footer-note">click dial to convert</span>
      </div>
    </div>

  </div>
</div>

<script>
  const CX = 95, CY = 95, R = 88;
  const circumference = 2 * Math.PI * R;

  (function() {
    const g = document.getElementById('ticks');
    for (let i = 0; i < 20; i++) {
      const isMajor = i % 2 === 0;
      const a = (i / 20) * 2 * Math.PI - Math.PI / 2;
      const innerLen = isMajor ? 11 : 6;
      const mk = (inner, outer) => [CX+inner*Math.cos(a), CY+inner*Math.sin(a), CX+outer*Math.cos(a), CY+outer*Math.sin(a)];
      const [x1,y1,x2,y2] = mk(R - innerLen, R + 2);
      const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
      ln.setAttribute('x1',x1); ln.setAttribute('y1',y1);
      ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
      ln.setAttribute('stroke', isMajor ? '#1A4A90' : '#163570');
      ln.setAttribute('stroke-width', isMajor ? (i===0?'2':'1.5') : '1');
      ln.setAttribute('stroke-linecap','round');
      g.appendChild(ln);
      if (isMajor) {
        const [lx,ly] = [CX+(R-24)*Math.cos(a), CY+(R-24)*Math.sin(a)];
        const tx = document.createElementNS('http://www.w3.org/2000/svg','text');
        tx.setAttribute('x',lx); tx.setAttribute('y',ly);
        tx.setAttribute('text-anchor','middle'); tx.setAttribute('dominant-baseline','central');
        tx.setAttribute('fill','#2A5A90'); tx.setAttribute('font-size','7');
        tx.setAttribute('font-family','Share Tech Mono, monospace');
        tx.setAttribute('transform',`rotate(90,${lx},${ly})`);
        tx.textContent = (i/2*100).toString().padStart(3,'0');
        g.appendChild(tx);
      }
    }
  })();

  const arc         = document.getElementById('arc');
  const handle      = document.getElementById('handle');
  const beatNum     = document.getElementById('beatNum');
  const beatFrac    = document.getElementById('beatFrac');
  const centerLabel = document.getElementById('centerLabel');
  const statRemain  = document.getElementById('statRemain');
  const convStat    = document.getElementById('convStat');
  const convVal     = document.getElementById('convVal');
  const convLbl     = document.getElementById('convLbl');
  const dialSvg     = document.getElementById('dialSvg');
  const dialWrap    = document.getElementById('dialWrap');
  const liveLogo    = document.querySelector('.live-logo');
  const sidebarLogo = document.querySelector('.sidebar-logo-glow');
  const arcStop1    = document.getElementById('arcStop1');
  const arcStop2    = document.getElementById('arcStop2');

  let lastBeat = -1, dragging = false, dragBeatWhole = 0, dragBeat = 0, resetTimer = null, hintTimer = null;

  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  function getInternetDate() {
    const now = new Date();
    return now.getDate() + '.' + MONTHS[now.getMonth()] + '.' + now.getFullYear();
  }

  function getBeats() {
    const now = new Date();
    const bmtMs = now.getTime() + (now.getTimezoneOffset() + 60) * 60000;
    const bmt = new Date(bmtMs);
    return (bmt.getHours()*3600 + bmt.getMinutes()*60 + bmt.getSeconds() + bmt.getMilliseconds()/1000) / 86.4;
  }

  function beatsToLocal(n) {
    let s = n * 86.4 - 3600 + (-new Date().getTimezoneOffset() * 60);
    s = ((s % 86400) + 86400) % 86400;
    let h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60).toString().padStart(2,'0');
    const ap = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    return h + ':' + m + ap;
  }

  function beatsUntil(month, day) {
    const now = new Date();
    let target = new Date(now.getFullYear(), month, day, 0, 0, 0, 0);
    if (target <= now) target.setFullYear(target.getFullYear() + 1);
    return Math.floor((target - now) / 86400000 * 1000).toLocaleString();
  }

  function updateCountdowns() {
    document.getElementById('halloweenBeats').textContent = beatsUntil(9, 31) + ' @';
    document.getElementById('christmasBeats').textContent = beatsUntil(11, 25) + ' @';
  }

  // Time-of-day arc colors — blue palette
  function getTimeOfDayColors(hour) {
    if (hour >= 5 && hour < 8)   return ['#2060A0','#80C0F0'];  // dawn — steel to pale blue
    if (hour >= 8 && hour < 11)  return ['#0F4E9E','#5BBFFF'];  // morning — royal to sky
    if (hour >= 11 && hour < 16) return ['#1B6EC2','#A0DCFF'];  // midday — bright blue to ice
    if (hour >= 16 && hour < 20) return ['#0D3A8A','#3A9FE0'];  // afternoon — deep to mid
    return ['#060F2E','#1B6EC2'];                                 // night — near-black to royal
  }
  function updateArcColors() {
    const [c1, c2] = getTimeOfDayColors(new Date().getHours());
    if (arcStop1) arcStop1.style.stopColor = c1;
    if (arcStop2) arcStop2.style.stopColor = c2;
  }

  // Alternating flash
  let flashToggle = 0;
  function fireAlternatingFlash() {
    const el = flashToggle % 2 === 0 ? liveLogo : sidebarLogo;
    if (el) {
      el.classList.remove('beat-flash');
      void el.offsetWidth;
      el.classList.add('beat-flash');
    }
    flashToggle++;
  }
  setInterval(fireAlternatingFlash, 2000);

  function placeHandle(n) {
    const a = (n / 1000) * 2 * Math.PI - Math.PI / 2;
    handle.setAttribute('cx', CX + R * Math.cos(a));
    handle.setAttribute('cy', CY + R * Math.sin(a));
  }

  function clientToBeat(clientX, clientY) {
    const pt = dialSvg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    const svgPt = pt.matrixTransform(dialSvg.getScreenCTM().inverse());
    const dx = svgPt.x - CX, dy = svgPt.y - CY;
    let a = Math.atan2(dy, dx);
    let beat = (a + Math.PI / 2) / (2 * Math.PI) * 1000;
    if (beat < 0) beat += 1000;
    if (beat >= 1000) beat -= 1000;
    return beat;
  }

  function startHintTimer() {
    clearHintTimer();
    hintTimer = setTimeout(() => convStat.classList.add('idle-hint'), 8000);
  }
  function clearHintTimer() {
    if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }
    convStat.classList.remove('idle-hint');
  }

  function startDrag(cx, cy) {
    if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }
    clearHintTimer();
    dragging = true;
    dragBeat = clientToBeat(cx, cy);
    document.body.classList.add('is-dragging');
    centerLabel.textContent = 'explore';
    beatFrac.textContent = '';
    convStat.classList.add('active');
    updateDrag(cx, cy);
  }

  function updateDrag(cx, cy) {
    if (!dragging) return;
    const raw = clientToBeat(cx, cy);
    dragBeat = dragBeat + (raw - dragBeat) * 0.4;
    const w = Math.floor(dragBeat);
    dragBeatWhole = w;
    placeHandle(dragBeat);
    arc.style.strokeDashoffset = circumference * (1 - dragBeat / 1000);
    beatNum.textContent = w.toString().padStart(3,'0');
    convVal.textContent = beatsToLocal(w);
    convLbl.textContent = '@' + w.toString().padStart(3,'0');
  }

  function resetConv() {
    centerLabel.textContent = '@ beats';
    convStat.classList.remove('active');
    convVal.textContent = '--:--';
    convLbl.textContent = '@ ?';
    startHintTimer();
  }

  function endDrag() {
    if (!dragging) return;
    dragging = false;
    document.body.classList.remove('is-dragging');
    document.body.style.cursor = '';
    resetTimer = setTimeout(resetConv, 5000);
  }

  dialWrap.addEventListener('mousedown',  e => { e.preventDefault(); startDrag(e.clientX, e.clientY); });
  window.addEventListener('mousemove',    e => { if (dragging) updateDrag(e.clientX, e.clientY); });
  window.addEventListener('mouseup',      endDrag);
  dialWrap.addEventListener('touchstart', e => { e.preventDefault(); startDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
  window.addEventListener('touchmove',    e => { if (dragging) { e.preventDefault(); updateDrag(e.touches[0].clientX, e.touches[0].clientY); } }, {passive:false});
  window.addEventListener('touchend',     endDrag);

  // ---- FX Canvas ----
  const fxCanvas = document.getElementById('fxCanvas');
  const ctx = fxCanvas.getContext('2d');
  let fxParticles = [], fxTimer = null, fxStart = 0, fxMode = null;

  function resizeCanvas() {
    const outer = document.querySelector('.outer');
    fxCanvas.width  = outer.offsetWidth;
    fxCanvas.height = outer.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function spawnSnow(n) {
    for (let i = 0; i < n; i++) {
      fxParticles.push({
        x: Math.random() * fxCanvas.width,
        y: Math.random() * -fxCanvas.height,
        r: 2 + Math.random() * 4,
        speed: 1 + Math.random() * 2.5,
        drift: (Math.random() - 0.5) * 0.8,
        opacity: 0.6 + Math.random() * 0.4
      });
    }
  }

  function spawnBats(n) {
    for (let i = 0; i < n; i++) {
      const fromLeft = Math.random() > 0.5;
      fxParticles.push({
        x: fromLeft ? -30 : fxCanvas.width + 30,
        y: 20 + Math.random() * (fxCanvas.height - 40),
        vx: fromLeft ? (2 + Math.random() * 3) : -(2 + Math.random() * 3),
        vy: (Math.random() - 0.5) * 1.2,
        size: 10 + Math.random() * 12,
        flapPhase: Math.random() * Math.PI * 2,
        flapSpeed: 0.15 + Math.random() * 0.1
      });
    }
  }

  function drawBat(x, y, size, phase) {
    ctx.save();
    ctx.translate(x, y);
    const flap = Math.sin(phase) * 0.5;
    ctx.fillStyle = 'rgba(20,0,30,0.85)';
    ctx.beginPath();
    ctx.ellipse(0, 0, size * 0.25, size * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-size * 0.5, -size * (0.3 + flap), -size, -size * (0.1 - flap), -size, size * 0.15);
    ctx.bezierCurveTo(-size * 0.6, size * 0.1, -size * 0.3, size * 0.05, 0, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(size * 0.5, -size * (0.3 + flap), size, -size * (0.1 - flap), size, size * 0.15);
    ctx.bezierCurveTo(size * 0.6, size * 0.1, size * 0.3, size * 0.05, 0, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-size*0.12, -size*0.16);
    ctx.lineTo(-size*0.06, -size*0.32);
    ctx.lineTo(0, -size*0.16);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(size*0.12, -size*0.16);
    ctx.lineTo(size*0.06, -size*0.32);
    ctx.lineTo(0, -size*0.16);
    ctx.fill();
    ctx.restore();
  }

  function fxLoop() {
    if (!fxMode) return;
    const elapsed = (Date.now() - fxStart) / 1000;
    const progress = Math.min(elapsed / 2, 1);
    ctx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);

    if (fxMode === 'snow') {
      if (progress < 0.8 && Math.random() < 0.4) spawnSnow(2);
      fxParticles.forEach(p => {
        p.y += p.speed;
        p.x += p.drift;
        const fade = progress > 0.7 ? 1 - (progress - 0.7) / 0.3 : 1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,230,255,${p.opacity * fade})`;
        ctx.fill();
      });
      fxParticles = fxParticles.filter(p => p.y < fxCanvas.height + 10);
    }

    if (fxMode === 'bats') {
      if (progress < 0.7 && Math.random() < 0.25) spawnBats(1);
      fxParticles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.flapPhase += p.flapSpeed;
        const fade = progress > 0.7 ? 1 - (progress - 0.7) / 0.3 : 1;
        ctx.globalAlpha = fade;
        drawBat(p.x, p.y, p.size, p.flapPhase);
        ctx.globalAlpha = 1;
      });
      fxParticles = fxParticles.filter(p => p.x > -60 && p.x < fxCanvas.width + 60);
    }

    if (progress < 1) {
      requestAnimationFrame(fxLoop);
    } else {
      ctx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
      fxMode = null;
      fxParticles = [];
    }
  }

  function triggerFX(mode) {
    fxMode = mode;
    fxParticles = [];
    fxStart = Date.now();
    resizeCanvas();
    if (mode === 'snow') spawnSnow(40);
    if (mode === 'bats') spawnBats(6);
    requestAnimationFrame(fxLoop);
  }

  document.querySelector('.countdown-item:first-child').addEventListener('click', () => triggerFX('bats'));
  document.querySelector('.countdown-item:last-child').addEventListener('click',  () => triggerFX('snow'));

  function tick() {
    if (dragging) return;
    const now = new Date();
    const beats = getBeats();
    const whole = Math.floor(beats);
    const frac = beats - whole;

    arc.style.strokeDashoffset = circumference * (1 - beats / 1000);
    placeHandle(beats);

    if (whole !== lastBeat) {
      beatNum.classList.add('tick');
      setTimeout(() => beatNum.classList.remove('tick'), 300);
      updateArcColors();
      lastBeat = whole;
    }

    beatNum.textContent = whole.toString().padStart(3,'0');
    beatFrac.textContent = '.' + Math.floor(frac * 100).toString().padStart(2,'0');
    centerLabel.textContent = '@ beats';
    statRemain.textContent = (999 - whole).toString().padStart(3,'0');

    let h = now.getHours();
    const m = now.getMinutes().toString().padStart(2,'0');
    const ap = h >= 12 ? 'p' : 'a';
    h = h % 12 || 12;
    document.getElementById('statLocal').textContent = h + ':' + m + ap;
    document.getElementById('footerDate').textContent = getInternetDate();
    updateCountdowns();
  }

  updateArcColors();
  startHintTimer();
  tick();
  setInterval(tick, 200);
</script>
</body>
</html>
